name: build-app
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    tags:
      - 'v*'
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev ffmpeg

      - name: Build sidecar
        run: |
          pip install -e ".[api,packaging]"
          pyinstaller packaging/localscribe-sidecar.spec --clean
          mkdir -p ui/src-tauri/binaries

      - name: Stage sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          cp dist/localscribe-sidecar ui/src-tauri/binaries/localscribe-sidecar-${{ matrix.target }}
          chmod +x ui/src-tauri/binaries/localscribe-sidecar-${{ matrix.target }}

      - name: Stage sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item dist\localscribe-sidecar.exe ui\src-tauri\binaries\localscribe-sidecar-${{ matrix.target }}.exe

      - name: Install JS deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ui
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('LocalScribe {0}', github.ref_name) || '' }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
